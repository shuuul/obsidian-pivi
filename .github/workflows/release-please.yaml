name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Manual release commits already contain an explicit version/changelog bump.
    # Let a maintainer-pushed tag trigger release.yaml; otherwise release-please
    # may open a stale/incorrect release PR from the manual commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Publishing is intentionally separate: a maintainer-pushed tag must
          # trigger release.yaml so its provenance certificate records "push".
          skip-github-release: true

  sync-obsidian-version-metadata:
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - name: Sync versions.json for Obsidian metadata
        run: node scripts/sync-version.js

      - name: Commit synced metadata if needed
        env:
          HEAD_BRANCH: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
        run: |
          if git diff --quiet -- manifest.json versions.json README.md; then
            echo "Obsidian version metadata already synced."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json README.md
          git commit -m "chore(release): sync Obsidian version metadata"
          git push origin "HEAD:${HEAD_BRANCH}"
