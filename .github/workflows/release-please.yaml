name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Manual release commits already contain an explicit version/changelog bump.
    # Let release.yaml publish those tags; otherwise release-please may open a
    # stale/incorrect release PR from the manual commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-obsidian-version-metadata:
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - name: Sync versions.json for Obsidian metadata
        run: node scripts/sync-version.js

      - name: Commit synced metadata if needed
        env:
          HEAD_BRANCH: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
        run: |
          if git diff --quiet -- manifest.json versions.json; then
            echo "Obsidian version metadata already synced."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json
          git commit -m "chore(release): sync Obsidian version metadata"
          git push origin "HEAD:${HEAD_BRANCH}"

  upload-plugin-artifacts:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync plugin version metadata
        run: node scripts/sync-version.js

      - name: Build plugin
        run: npm run build

      - name: Verify release artifacts
        env:
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          for file in main.js manifest.json styles.css; do
            if [ ! -f "$file" ]; then
              echo "Missing release artifact: $file"
              exit 1
            fi
          done

          manifest_version="$(node -p "require('./manifest.json').version")"
          if [[ "$RELEASE_TAG" == v* ]]; then
            echo "Obsidian plugin releases must not use a leading 'v' tag. Use '${manifest_version}', not '$RELEASE_TAG'."
            exit 1
          fi
          if [ "$manifest_version" != "$RELEASE_TAG" ]; then
            echo "manifest.json version ($manifest_version) does not match tag ($RELEASE_TAG)"
            exit 1
          fi

      - name: Upload release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          gh release upload "$RELEASE_TAG" \
            main.js manifest.json styles.css \
            --clobber
