name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    # Manual release commits already contain an explicit version/changelog bump.
    # Let release.yaml publish those tags; otherwise release-please may open a
    # stale/incorrect release PR from the manual commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      prs_created: ${{ steps.release.outputs.prs_created }}
      pr: ${{ steps.release.outputs.pr }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  sync-obsidian-version-metadata:
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout release PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}

      - name: Sync versions.json for Obsidian metadata
        run: node scripts/sync-version.js

      - name: Commit synced metadata if needed
        env:
          HEAD_BRANCH: ${{ fromJSON(needs.release-please.outputs.pr).headBranchName }}
        run: |
          if git diff --quiet -- manifest.json versions.json README.md; then
            echo "Obsidian version metadata already synced."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json versions.json README.md
          git commit -m "chore(release): sync Obsidian version metadata"
          git push origin "HEAD:${HEAD_BRANCH}"

  dispatch-plugin-release:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch tag-bound release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh workflow run release.yaml \
            --ref "$RELEASE_TAG" \
            -f tag="$RELEASE_TAG"
