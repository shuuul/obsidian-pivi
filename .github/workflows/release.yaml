name: Release Obsidian plugin

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: 0.2.0; must match manifest.json version exactly)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync plugin version metadata
        run: node scripts/sync-version.js

      - name: Build plugin
        run: npm run build

      - name: Verify release artifacts
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi

          expected_ref="refs/tags/${tag}"
          if [ "${GITHUB_REF}" != "$expected_ref" ]; then
            echo "Release workflow must run from $expected_ref, not ${GITHUB_REF}."
            exit 1
          fi

          for file in main.js manifest.json styles.css; do
            if [ ! -f "$file" ]; then
              echo "Missing release artifact: $file"
              exit 1
            fi
          done

          manifest_version="$(node -p "require('./manifest.json').version")"
          if [[ "$tag" == v* ]]; then
            echo "Obsidian plugin releases must not use a leading 'v' tag. Use '${manifest_version}', not '$tag'."
            exit 1
          fi
          if [ "$manifest_version" != "$tag" ]; then
            echo "manifest.json version ($manifest_version) does not match tag ($tag)"
            exit 1
          fi

      # Keep one subject per statement until downstream sigstore-rs consumers
      # support every subject in multi-subject DSSE attestations.
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json

      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Prepare release notes
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi

          version="$tag"
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            echo "See CHANGELOG.md for details." > "$notes_file"
          fi

          echo "RELEASE_TAG_RESOLVED=${tag}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG_RESOLVED" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG_RESOLVED" \
              --title "$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE"
            gh release upload "$RELEASE_TAG_RESOLVED" \
              main.js manifest.json styles.css \
              --clobber
          else
            gh release create "$RELEASE_TAG_RESOLVED" \
              --title="$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE" \
              main.js manifest.json styles.css
          fi

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          download_dir="${RUNNER_TEMP}/published-release-assets"
          mkdir -p "$download_dir"
          gh release download "$RELEASE_TAG_RESOLVED" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$download_dir" \
            --pattern main.js \
            --pattern manifest.json \
            --pattern styles.css

          for file in main.js manifest.json styles.css; do
            verified=false
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "$download_dir/$file" \
                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yaml" \
                --source-ref "refs/tags/$RELEASE_TAG_RESOLVED" \
                --source-digest "$GITHUB_SHA" \
                --deny-self-hosted-runners; then
                verified=true
                break
              fi
              sleep 5
            done

            if [ "$verified" != true ]; then
              echo "Published asset failed attestation verification: $file"
              exit 1
            fi
          done
