name: Release Obsidian plugin

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (example: v0.2.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Sync plugin version metadata
        run: node scripts/sync-version.js

      - name: Build plugin
        run: npm run build

      - name: Verify release artifacts
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi

          for file in main.js manifest.json styles.css; do
            if [ ! -f "$file" ]; then
              echo "Missing release artifact: $file"
              exit 1
            fi
          done

          manifest_version="$(node -p "require('./manifest.json').version")"
          tag_version="${tag#v}"
          if [ "$manifest_version" != "$tag_version" ]; then
            echo "manifest.json version ($manifest_version) does not match tag ($tag_version)"
            exit 1
          fi

      - name: Prepare release notes
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            tag="${INPUT_TAG}"
          else
            tag="${RELEASE_TAG}"
          fi

          version="${tag#v}"
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { found = 1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"

          if [ ! -s "$notes_file" ]; then
            echo "See CHANGELOG.md for details." > "$notes_file"
          fi

          echo "RELEASE_TAG_RESOLVED=${tag}" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG_RESOLVED" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG_RESOLVED" --notes-file "$RELEASE_NOTES_FILE"
            gh release upload "$RELEASE_TAG_RESOLVED" \
              main.js manifest.json styles.css \
              --clobber
          else
            gh release create "$RELEASE_TAG_RESOLVED" \
              --title="$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE" \
              main.js manifest.json styles.css
          fi
