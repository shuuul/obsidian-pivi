name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Verify release artifacts
        run: |
          tag="${GITHUB_REF_NAME}"

          expected_ref="refs/tags/${tag}"
          if [ "${GITHUB_REF}" != "$expected_ref" ]; then
            echo "Release workflow must run from $expected_ref, not ${GITHUB_REF}."
            exit 1
          fi

          for file in main.js manifest.json styles.css; do
            if [ ! -f "$file" ]; then
              echo "Missing release artifact: $file"
              exit 1
            fi
          done

          manifest_version="$(node -p "require('./manifest.json').version")"
          package_version="$(node -p "require('./package.json').version")"
          if [[ "$tag" == v* ]]; then
            echo "Obsidian plugin releases must not use a leading 'v' tag. Use '${manifest_version}', not '$tag'."
            exit 1
          fi
          if [ "$manifest_version" != "$tag" ]; then
            echo "manifest.json version ($manifest_version) does not match tag ($tag)"
            exit 1
          fi
          if [ "$package_version" != "$tag" ]; then
            echo "package.json version ($package_version) does not match tag ($tag)"
            exit 1
          fi

          echo "RELEASE_TAG_RESOLVED=${tag}" >> "$GITHUB_ENV"

      - name: Prepare release notes
        run: |
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v version="$RELEASE_TAG_RESOLVED" '
            index($0, "## [" version "]") == 1 { found = 1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"

          if ! grep -q '[^[:space:]]' "$notes_file"; then
            echo "CHANGELOG.md has no non-empty section for $RELEASE_TAG_RESOLVED."
            exit 1
          fi

          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Attest release assets
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG_RESOLVED" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG_RESOLVED" \
              --title "$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE"
            gh release upload "$RELEASE_TAG_RESOLVED" \
              main.js manifest.json styles.css \
              --clobber
          else
            gh release create "$RELEASE_TAG_RESOLVED" \
              --title="$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE" \
              main.js manifest.json styles.css
          fi

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          download_dir="${RUNNER_TEMP}/published-release-assets"
          mkdir -p "$download_dir"
          gh release download "$RELEASE_TAG_RESOLVED" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$download_dir" \
            --pattern main.js \
            --pattern manifest.json \
            --pattern styles.css

          for file in main.js manifest.json styles.css; do
            verified=false
            for attempt in 1 2 3 4 5; do
              if gh attestation verify "$download_dir/$file" \
                --repo "$GITHUB_REPOSITORY" \
                --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yaml" \
                --source-ref "refs/tags/$RELEASE_TAG_RESOLVED" \
                --source-digest "$GITHUB_SHA" \
                --deny-self-hosted-runners; then
                verified=true
                break
              fi
              sleep 5
            done

            if [ "$verified" != true ]; then
              echo "Published asset failed attestation verification: $file"
              exit 1
            fi
          done
