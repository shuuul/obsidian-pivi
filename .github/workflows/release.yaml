name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Use Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        run: |
          tag="${GITHUB_REF_NAME}"

          expected_ref="refs/tags/${tag}"
          if [ "${GITHUB_REF}" != "$expected_ref" ]; then
            echo "Release workflow must run from $expected_ref, not ${GITHUB_REF}."
            exit 1
          fi

          package_version="$(node -p "require('./package.json').version")"
          if [[ "$tag" == v* ]]; then
            echo "Obsidian plugin releases must not use a leading 'v' tag. Use '${package_version}', not '$tag'."
            exit 1
          fi
          if [ "$package_version" != "$tag" ]; then
            echo "package.json version ($package_version) does not match tag ($tag)"
            exit 1
          fi

          if node -e "process.exit(require('semver').prerelease('$package_version') ? 0 : 1)"; then
            echo "IS_PRERELEASE=true" >> "$GITHUB_ENV"
          else
            echo "IS_PRERELEASE=false" >> "$GITHUB_ENV"
          fi

          echo "RELEASE_TAG_RESOLVED=${tag}" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION_RESOLVED=${package_version}" >> "$GITHUB_ENV"

      # Publication depends on the same mandatory gates as CI for this exact tag commit.
      - name: Quality gates
        uses: ./.github/actions/quality-gates

      - name: Prepare release manifest
        run: |
          if [ "$IS_PRERELEASE" = "true" ]; then
            node scripts/write-release-manifest.js
          else
            manifest_version="$(node -p "require('./manifest.json').version")"
            if [ "$manifest_version" != "$RELEASE_TAG_RESOLVED" ]; then
              echo "manifest.json version ($manifest_version) does not match tag ($RELEASE_TAG_RESOLVED)"
              exit 1
            fi
          fi

          release_manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$release_manifest_version" != "$RELEASE_TAG_RESOLVED" ]; then
            echo "Release manifest version ($release_manifest_version) does not match tag ($RELEASE_TAG_RESOLVED)"
            exit 1
          fi

          for file in main.js manifest.json styles.css; do
            if [ ! -f "$file" ]; then
              echo "Missing release artifact: $file"
              exit 1
            fi
          done

      - name: Prepare release notes
        run: |
          notes_file="${RUNNER_TEMP}/release-notes.md"
          awk -v version="$RELEASE_TAG_RESOLVED" '
            index($0, "## [" version "]") == 1 { found = 1; next }
            found && index($0, "## [") == 1 { exit }
            found { print }
          ' CHANGELOG.md > "$notes_file"

          if ! grep -q '[^[:space:]]' "$notes_file"; then
            if [ "$IS_PRERELEASE" = "true" ]; then
              printf 'Pivi Obsidian plugin v%s\n' "$RELEASE_TAG_RESOLVED" > "$notes_file"
            else
              echo "CHANGELOG.md has no non-empty section for $RELEASE_TAG_RESOLVED."
              exit 1
            fi
          fi

          echo "RELEASE_NOTES_FILE=${notes_file}" >> "$GITHUB_ENV"

      - name: Create or update GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_flag="--prerelease"
          fi

          if gh release view "$RELEASE_TAG_RESOLVED" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG_RESOLVED" \
              --title "$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE" \
              $prerelease_flag
            gh release upload "$RELEASE_TAG_RESOLVED" \
              main.js manifest.json styles.css \
              --clobber
          else
            gh release create "$RELEASE_TAG_RESOLVED" \
              --title="$RELEASE_TAG_RESOLVED" \
              --notes-file "$RELEASE_NOTES_FILE" \
              $prerelease_flag \
              main.js manifest.json styles.css
          fi

      - name: Verify published release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          download_dir="${RUNNER_TEMP}/published-release-assets"
          mkdir -p "$download_dir"
          gh release download "$RELEASE_TAG_RESOLVED" \
            --repo "$GITHUB_REPOSITORY" \
            --dir "$download_dir" \
            --pattern main.js \
            --pattern manifest.json \
            --pattern styles.css

          for file in main.js manifest.json styles.css; do
            if ! cmp --silent "$file" "$download_dir/$file"; then
              echo "Published asset differs from the tag build: $file"
              exit 1
            fi
          done

          sha256sum "$download_dir/main.js" \
            "$download_dir/manifest.json" \
            "$download_dir/styles.css"
